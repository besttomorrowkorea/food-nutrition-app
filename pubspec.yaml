name: food_nutrition_app
description: 음식 사진으로 영양소를 분석하는 건강 관리 앱 (NutriSync)

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6

  # 상태 관리
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.1.0
  cloud_functions: ^5.0.4
  firebase_storage: ^12.1.0

  # 이미지
  image_picker: ^1.0.7
  image: ^4.1.7

  # 네트워크
  http: ^1.2.1

  # 구독 결제
  purchases_flutter: ^8.1.0

  # 유틸리티
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  table_calendar: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.3
  mockito: ^5.4.4

flutter:
  uses-material-design: true
